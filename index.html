<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>lucastang.dev</title>
<meta content="Lucas Tang — developer." name="description"/>
<meta content="lucastang.dev" property="og:title"/>
<meta content="Lucas Tang — developer." property="og:description"/>
<link href="/favicon.ico" rel="icon"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="/style.css" rel="stylesheet"/>
</head>
<body>

<div id="stage">
  <div id="desk-photo"></div>

  <div id="top-monitor" class="monitor-overlay">
    <div class="boot-splash"><div class="boot-spinner"></div></div>
    <div id="top-monitor-inner" class="screen-content">
      <div id="preview-pane">
        <div class="browser-chrome">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          <span class="url">lucastang.dev</span>
        </div>
        <div class="preview-frame-wrap">
          <iframe class="preview-frame" src="/projects/" tabindex="-1" loading="lazy"></iframe>
        </div>
      </div>
      <div id="spotify-pane">
        <iframe
          src="https://open.spotify.com/embed/playlist/33zDbT2VaLbq6yCFW05piK?utm_source=generator&theme=0"
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy">
        </iframe>
      </div>
    </div>
  </div>

  <div id="bottom-monitor" class="monitor-overlay">
    <div class="boot-splash"><div class="boot-spinner"></div></div>
    <div id="code-stage" class="screen-content">
      <div id="code-editor">
        <div class="gutter"></div>
        <div class="code-body"></div>
      </div>
      <div id="terminal-panel"></div>
    </div>
  </div>
</div>

<div id="scroll-hint">Scroll to continue</div>

<header id="site-header">
  <div class="nav">
    <a href="/" class="brand">
      <img src="/apple-touch-icon.png" alt="Avatar Logo" class="logo-mark"/>
      <span class="logo">lucastang.dev</span>
    </a>
    <nav class="links">
      <a href="/projects/">Projects</a>
      <a href="/aboutme/">About Me</a>
    </nav>
  </div>
</header>

<script src="/boot.js"></script>
</body>
</html>
