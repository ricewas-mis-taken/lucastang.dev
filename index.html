<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>lucastang.dev</title>
<meta content="Lucas Tang — developer." name="description"/>
<meta content="lucastang.dev" property="og:title"/>
<meta content="Lucas Tang — developer." property="og:description"/>
<link href="/favicon.ico" rel="icon"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="/style.css" rel="stylesheet"/>
</head>
<body>

<div id="stage">
  <img id="desk-photo" src="/assets/desk-photo.png" alt=""/>

  <div id="top-monitor" class="monitor-overlay">
    <div class="boot-splash"><div class="boot-spinner"></div></div>
    <div id="top-monitor-inner" class="screen-content">
      <div id="preview-pane">
        <div class="gh-topbar">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          <span class="url">github.com/lucastang/lucastang.dev</span>
        </div>
        <div class="gh-body">
          <main class="gh-main">
            <div class="gh-stats">
              <span class="gh-stat">128 stars</span>
              <span class="gh-stat">24 forks</span>
            </div>
            <div class="gh-graph" id="gh-graph"></div>
            <ul class="gh-commits" id="gh-commits"></ul>
          </main>
        </div>
      </div>
      <div id="spotify-pane">
        <div class="sp-widget">
          <div class="sp-art"><img id="sp-art-img" src="" alt=""/></div>
          <div class="sp-info">
            <div class="sp-title" id="sp-title">&nbsp;</div>
            <div class="sp-artist" id="sp-artist">&nbsp;</div>
            <div class="sp-progress"><div class="sp-progress-fill" id="sp-progress-fill"></div></div>
          </div>
          <div class="sp-controls">
            <button class="sp-btn sp-prev" id="sp-prev" aria-label="Previous track"><span class="sp-icon sp-icon-prev"></span></button>
            <button class="sp-btn sp-play" id="sp-play" aria-label="Pause"><span class="sp-icon-playpause is-playing" id="sp-play-icon"></span></button>
            <button class="sp-btn sp-next" id="sp-next" aria-label="Next track"><span class="sp-icon sp-icon-next"></span></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="bottom-monitor" class="monitor-overlay">
    <div class="boot-splash"><div class="boot-spinner"></div></div>
    <div id="code-stage" class="screen-content">
      <div id="code-editor">
        <div class="gutter"></div>
        <div class="code-body"></div>
      </div>
      <div id="terminal-panel"></div>
    </div>
  </div>
</div>

<div id="scroll-hint">Scroll to continue</div>

<header id="site-header">
  <div class="nav">
    <a href="/" class="brand">
      <img src="/apple-touch-icon.png" alt="Avatar Logo" class="logo-mark"/>
      <span class="logo">lucastang.dev</span>
    </a>
    <nav class="links">
      <a href="/projects/">Projects</a>
      <a href="/aboutme/">About Me</a>
    </nav>
  </div>
</header>

<script src="/boot.js"></script>
</body>
</html>
