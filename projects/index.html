<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Projects — lucastang.dev</title>
<meta content="Project overview by Lucas Tang." name="description"/>
<meta content="lucastang.dev" property="og:title"/>
<meta content="Project overview by Lucas Tang." property="og:description"/>
<link href="/favicon.ico" rel="icon"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #000000;
  --bg-deep: #000000;
  --card: #0a0a0a;
  --orange: #f97316;
  --orange-dark: #ea5a08;
  --ink: #ffffff;
  --muted: #cccccc;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Inter", system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--ink); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
.display { font-family: "Architects Daughter", cursive; font-weight: 700; }
header { position: sticky; top: 0; z-index: 50; background: var(--bg-deep); border-bottom: 1px solid #222; }
.nav { max-width: 1000px; margin: 0 auto; padding: 1.1rem 1.5rem; display: flex; align-items: center; gap: 0.6rem; }

/* UPDATED AVATAR CSS */
.logo-mark { width: 32px; height: 32px; border-radius: 9px; object-fit: cover; }
.logo { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.01em; color: var(--ink); }

main { flex: 1; max-width: 1000px; margin: 0 auto; padding: 3.5rem 1.5rem; width: 100%; }
.section-title { font-size: clamp(2rem, 5vw, 2.8rem); text-align: center; margin-bottom: 2.5rem; color: #ffffff; }
.projects { display: flex; flex-direction: column; gap: 1rem; max-width: 720px; margin: 0 auto 4.5rem; }
.project-bar { background: #0a0a0a; border: 1px solid #222; border-radius: 12px; padding: 1.1rem 1.4rem; cursor: pointer; text-align: left; color: #ffffff; transition: background 0.18s ease, transform 0.12s ease; font-family: inherit; width: 100%; }
.project-bar:hover { background: #151515; transform: translateY(-2px); }
.project-bar:focus-visible { outline: 3px solid #ffffff; outline-offset: 3px; }
.project-head { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
.project-head h3 { font-size: 1.15rem; font-weight: 700; color: #ffffff; }
.toggle { font-size: 1.3rem; font-weight: 700; transition: transform 0.2s ease; line-height: 1; color: #ffffff; }
.project-bar[aria-expanded="true"] .toggle { transform: rotate(45deg); }
.blurb { max-height: 0; overflow: hidden; transition: max-height 0.28s ease, margin-top 0.28s ease; color: #ffffff; font-size: 0.98rem; }
.project-bar[aria-expanded="true"] .blurb { max-height: 600px; margin-top: 0.75rem; }
.see-more { display: inline-block; margin-top: 0.9rem; padding: 0.5rem 0.9rem; background: #000; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: background 0.15s ease; }
.see-more:hover { background: #222; }
footer { text-align: center; padding: 2rem 1.5rem; color: var(--muted); font-size: 0.9rem; border-top: 1px solid #222; }
</style>
</head>
<body>
<header>
<div class="nav">
<a href="/" style="text-decoration:none; display:flex; align-items:center; gap:0.6rem;">
<!-- UPDATED HEADER IMAGE -->
<img src="/apple-touch-icon.png" alt="Avatar Logo" class="logo-mark" />
<div class="logo display">lucastang.dev</div>
</a>
</div>
</header>
<main>
<h1 class="section-title display">Project overview</h1>
<div class="projects">
<button aria-expanded="false" class="project-bar" onclick="this.setAttribute('aria-expanded', this.getAttribute('aria-expanded')==='true'?'false':'true')">
<div class="project-head"><h3>TypeSense</h3><span class="toggle">+</span></div>
<div class="blurb">
<p>A passive research tool that monitors how you type — not what you type — to predict mental health states like stress, focus, and energy. Every key is anonymized to a category number, so no content is ever recoverable. Every 15 seconds it computes timing features from your keystrokes; every 20 minutes it asks how you're feeling. The goal is to train a model that can predict your mental state from typing patterns alone.</p>
<a class="see-more" href="/TypeSense" onclick="event.stopPropagation()">See more</a>
</div>
</button>
<button aria-expanded="false" class="project-bar" onclick="this.setAttribute('aria-expanded', this.getAttribute('aria-expanded')==='true'?'false':'true')">
<div class="project-head"><h3>gexel</h3><span class="toggle">+</span></div>
<div class="blurb">
<p>A collection of small arcade-style browser games built for a game jam, including a Pac-Man-inspired maze chase. Playable directly in the browser with fullscreen support.</p>
<a class="see-more" href="/gexel" onclick="event.stopPropagation()">See more</a>
</div>
</button>
<button aria-expanded="false" class="project-bar" onclick="this.setAttribute('aria-expanded', this.getAttribute('aria-expanded')==='true'?'false':'true')">
<div class="project-head"><h3>Under construction</h3><span class="toggle">+</span></div>
<div class="blurb"><p>Unavailable</p></div>
</button>
</div>
</main>
<footer>© 2026 lucastang.dev</footer>
</body>
</html>
