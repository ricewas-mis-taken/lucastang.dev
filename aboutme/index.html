<style>
:root {
  --bg: #000000;
  --bg-deep: #000000;
  --card: #0a0a0a;
  --orange: #f97316;
  --orange-dark: #ea5a08;
  --ink: #ffffff;
  --muted: #cccccc;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Inter", system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--ink); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
.display { font-family: "Architects Daughter", cursive; font-weight: 700; }
header { position: sticky; top: 0; z-index: 50; background: var(--bg-deep); border-bottom: 1px solid #222; }
.nav { max-width: 1000px; margin: 0 auto; padding: 1.1rem 1.5rem; display: flex; align-items: center; gap: 0.6rem; }

/* UPDATED AVATAR CSS */
.logo-mark { width: 32px; height: 32px; border-radius: 9px; object-fit: cover; }
.logo { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.01em; color: var(--ink); }

main { flex: 1; max-width: 1000px; margin: 0 auto; padding: 3.5rem 1.5rem; width: 100%; }
.about { background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 2.5rem; display: grid; grid-template-columns: 200px 1fr; gap: 2.5rem; align-items: center; max-width: 820px; margin: 0 auto; }
.photo { aspect-ratio: 1; border-radius: 16px; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--orange); border: 2px dashed #444; text-align: center; gap: 0.5rem; }
.photo svg { width: 42px; height: 42px; opacity: 0.8; }
.photo span { font-size: 0.8rem; color: var(--muted); }
.about h2 { font-size: 1.6rem; margin-bottom: 0.4rem; color: var(--orange); }
.about .role { color: var(--ink); font-weight: 600; margin-bottom: 1rem; }
.about p { color: var(--muted); margin-bottom: 1rem; }
footer { text-align: center; padding: 2rem 1.5rem; color: var(--muted); font-size: 0.9rem; border-top: 1px solid #222; }
@media (max-width: 640px) { .about { grid-template-columns: 1fr; text-align: center; } .photo { max-width: 200px; margin: 0 auto; } }
</style>
</head>
