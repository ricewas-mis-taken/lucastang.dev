<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>lucastang.dev</title>
<meta content="Project overview by Lucas Tang." name="description"/>
<meta content="lucastang.dev" property="og:title"/>
<meta content="Project overview by Lucas Tang." property="og:description"/>
<link href="favicon.ico" rel="icon"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #000000;
  --bg-deep: #000000;
  --ink: #ffffff;
  --muted: #cccccc;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Inter", system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--ink); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
.display { font-family: "Architects Daughter", cursive; font-weight: 700; }
header { position: sticky; top: 0; z-index: 50; background: var(--bg-deep); border-bottom: 1px solid #222; }
.nav { max-width: 1000px; margin: 0 auto; padding: 1.1rem 1.5rem; display: flex; align-items: center; gap: 0.6rem; }
.logo-mark { width: 32px; height: 32px; border-radius: 9px; object-fit: cover; }
.logo { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.01em; color: var(--ink); }
main { flex: 1; max-width: 1000px; margin: 0 auto; padding: 3.5rem 1.5rem; width: 100%; display: flex; flex-direction: column; align-items: center; }
.game-wrap { width: 900px; max-width: 100%; position: relative; }
.game-frame { width: 100%; aspect-ratio: 3 / 2; border: 2px solid #2ea84a; border-radius: 6px; display: block; }
.game-frame:fullscreen { width: 100vw; height: 100vh; aspect-ratio: unset; border: none; border-radius: 0; object-fit: contain; }
.fullscreen-btn { position: absolute; top: 8px; right: 8px; background: #2ea84a; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.85rem; }
.fullscreen-btn:hover { background: #1a5c37; }
.debug-note { max-width: 900px; margin-top: 1.5rem; color: var(--muted); font-size: 0.9rem; text-align: center; }
</style>
</head>
<body>
<header>
<div class="nav">
<a href="/" style="text-decoration:none; display:flex; align-items:center; gap:0.6rem;">
<img src="apple-touch-icon.png" alt="Avatar Logo" class="logo-mark" />
<div class="logo display">lucastang.dev</div>
</a>
</div>
</header>
<main>
<div class="game-wrap">
    <iframe id="gexel-frame" class="game-frame" src="/gexel-game/" allow="fullscreen" allowfullscreen></iframe>
</div>
<p class="debug-note">This is debug version: Use "/" to jump to debug panel, you can be lazy and instantly beat games by clicking their respective buttons!</p>
</main>
</body>
</html>
